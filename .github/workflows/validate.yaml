name: TF format and validate
on:
  workflow_call:
jobs:
  validate:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/opentofu/opentofu:1.11.5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: fmt
        run: |
          tofu fmt -write=false -diff -check -recursive

      - name: validate
        run: |
          tofu init
          tofu validate
